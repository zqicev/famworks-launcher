appId: com.famworks.launcher
productName: FamWorks Launcher
copyright: Copyright © 2025 FamWorks

directories:
  output: release
  buildResources: build

icon: build/icon.ico

files:
  - out/**/*
  - package.json

# Иконка окна/таскбара доступна в рантайме рядом с приложением
extraResources:
  - from: build/icon.png
    to: icon.png

# Native deps отсутствуют — всё пакуется в asar
asar: true
# msmc делает динамический import своих файлов — он должен лежать распакованным,
# иначе вход через Microsoft падает внутри asar-архива.
asarUnpack:
  - "**/node_modules/msmc/**"

win:
  # Пропускаем rcedit/подпись на внутреннем exe (winCodeSign падает на macOS-симлинках
  # без Developer Mode). Иконку финального portable-exe ставит NSIS из icon.ico напрямую.
  signAndEditExecutable: false
  target:
    - target: portable
      arch:
        - x64
  artifactName: FamWorks-Launcher-${version}-portable.exe

portable:
  artifactName: FamWorks-Launcher-${version}-portable.exe

# Снимаем требование code-signing (для теста)
forceCodeSigning: false
