appId: com.famworks.launcher
productName: FamWorks Launcher
copyright: Copyright © 2025 FamWorks

directories:
  output: release
  buildResources: build

icon: build/icon.ico
afterPack: scripts/afterPack.js

files:
  - out/**/*
  - package.json

# Иконка окна/таскбара доступна в рантайме рядом с приложением
extraResources:
  - from: build/icon.png
    to: icon.png

# Native deps отсутствуют — всё пакуется в asar
asar: true
# msmc делает динамический import своих файлов — он должен лежать распакованным,
# иначе вход через Microsoft падает внутри asar-архива.
asarUnpack:
  - "**/node_modules/msmc/**"

# Куда electron-updater ходит за обновлениями (публичный репо — токен в клиенте не нужен).
# Сюда же electron-builder --publish заливает установщик + latest.yml + blockmap.
publish:
  provider: github
  owner: zqicev
  repo: famworks-builds
  releaseType: release

win:
  # Пропускаем rcedit/подпись на внутреннем exe (winCodeSign падает на macOS-симлинках
  # без Developer Mode). Иконку ярлыков и установщика NSIS берёт из icon.ico напрямую.
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  artifactName: FamWorks-Launcher-Setup-${version}.exe

nsis:
  oneClick: false                          # обычный мастер установки
  perMachine: false                        # установка в %LOCALAPPDATA% — без прав админа
  allowToChangeInstallationDirectory: true # можно выбрать папку
  allowElevation: false                    # не требуем UAC
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FamWorks Launcher
  deleteAppDataOnUninstall: false          # настройки/аккаунты не трём при удалении
  artifactName: FamWorks-Launcher-Setup-${version}.exe

# Снимаем требование code-signing (нет сертификата — на Windows автообновление и так работает)
forceCodeSigning: false
