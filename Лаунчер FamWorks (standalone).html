document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

overflow-y:auto;padding:0 14px 14px;display:flex;flex-direction:column;gap:6px\">\n      <sc-for list=\"{{ builds }}\" as=\"b\" hint-placeholder-count=\"2\">\n        <div onclick=\"{{ b.onSelect }}\" style=\"{{ b.rowStyle }}\">\n          <div style=\"{{ b.barStyle }}\"><\u002Fdiv>\n          <div style=\"{{ b.iconStyle }}\">\n            <span style=\"font-family:'Oswald';font-weight:700;font-size:17px;color:#0a0a0a\">{{ b.initial }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:{{ b.nameColor }}\">{{ b.name }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;color:#6a6a63;margin-top:2px\">{{ b.meta }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"{{ b.dotStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- account card -->\n    <div style=\"padding:14px;border-top:1px solid rgba(255,255,255,.06);position:relative\">\n\n      <sc-if value=\"{{ accountOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;left:14px;right:14px;bottom:78px;background:#101010;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px;box-shadow:0 18px 50px rgba(0,0,0,.6);z-index:20\">\n          <div style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:#5e5e58;text-transform:uppercase;padding:6px 8px 10px\">Аккаунты<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:4px\">\n            <sc-for list=\"{{ accounts }}\" as=\"a\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ a.onSelect }}\" style=\"{{ a.rowStyle }}\">\n                <div style=\"{{ a.avatarStyle }}\"><\u002Fdiv>\n                <div style=\"flex:1;min-width:0\">\n                  <div style=\"font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:.4px;color:#f1f1ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ a.nick }}<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:#6a6a63;text-transform:uppercase\">{{ a.type }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"{{ a.checkStyle }}\">{{ a.check }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:rgba(255,255,255,.07);margin:10px 4px\"><\u002Fdiv>\n          <div style=\"display:flex;gap:6px;padding:0 2px 2px\">\n            <div onclick=\"{{ addMicrosoft }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid rgba(255,255,255,.12);border-radius:9px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.5px;color:#bdbdb6;cursor:pointer;text-transform:uppercase\">\n              <span style=\"width:8px;height:8px;background:#5ea8ff;border-radius:2px\"><\u002Fspan>Microsoft\n            <\u002Fdiv>\n            <div onclick=\"{{ addMojang }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid rgba(255,255,255,.12);border-radius:9px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.5px;color:#bdbdb6;cursor:pointer;text-transform:uppercase\">\n              <span style=\"width:8px;height:8px;background:#5fb868;border-radius:2px\"><\u002Fspan>Minecraft\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div onclick=\"{{ toggleAccount }}\" style=\"display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:12px;cursor:pointer;background:{{ accountBg }};border:1px solid {{ accountBorder }}\">\n        <div style=\"{{ activeAvatarStyle }}\"><\u002Fdiv>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.4px;color:#f1f1ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ activeNick }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:5px;margin-top:2px\">\n            <span style=\"width:6px;height:6px;border-radius:50%;background:{{ activeTypeColor }}\"><\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:#6a6a63;text-transform:uppercase\">{{ activeType }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-family:'JetBrains Mono';font-size:14px;color:#6a6a63;transform:{{ chevron }}\">⌃<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ===================== MAIN ===================== -->\n  <main style=\"flex:1;height:100%;display:flex;flex-direction:column;min-width:0;position:relative\">\n\n    <!-- hero -->\n    <div style=\"height:230px;min-height:230px;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.06)\">\n      <div style=\"position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,#141414 0 22px,#101010 22px 44px)\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,6,6,.96) 0%,rgba(6,6,6,.7) 45%,rgba(6,6,6,.25) 100%)\"><\u002Fdiv>\n      <div style=\"position:absolute;top:18px;right:22px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:#4a4a44;text-transform:uppercase\">[ скриншот сборки ]<\u002Fdiv>\n      <div style=\"position:absolute;left:40px;bottom:30px;right:40px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">\n          <span style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:#c5f82a;text-transform:uppercase\">{{ heroStatus }}<\u002Fspan>\n          <span style=\"width:4px;height:4px;border-radius:50%;background:#3a3a34\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px;color:#7a7a72;text-transform:uppercase\">{{ heroLoader }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Oswald';font-weight:700;font-size:54px;line-height:.92;letter-spacing:1px;text-transform:uppercase;color:#f4f4f1\">{{ heroName }}<\u002Fdiv>\n        <div style=\"font-family:'Archivo';font-size:13px;color:#8a8a82;margin-top:10px;max-width:560px;line-height:1.5\">{{ heroDesc }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- tabs + stats row -->\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 40px 0\">\n      <div style=\"display:flex;gap:8px\">\n        <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n          <div onclick=\"{{ t.onSelect }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:26px\">\n        <sc-for list=\"{{ heroStats }}\" as=\"s\" hint-placeholder-count=\"3\">\n          <div style=\"text-align:right\">\n            <div style=\"font-family:'Oswald';font-weight:600;font-size:18px;color:#f1f1ee\">{{ s.value }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:#5e5e58;text-transform:uppercase;margin-top:1px\">{{ s.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- content -->\n    <div style=\"flex:1;overflow-y:auto;padding:22px 40px 24px;min-height:0\">\n\n      <!-- MODS TAB -->\n      <sc-if value=\"{{ isMods }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <!-- mods toolbar -->\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n            <div style=\"flex:1;display:flex;align-items:center;gap:10px;background:#0e0e0e;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:11px 14px\">\n              <span style=\"font-family:'JetBrains Mono';color:#5e5e58;font-size:13px\">⌕<\u002Fspan>\n              <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"Поиск модов\" style=\"flex:1;background:transparent;border:none;outline:none;color:#f1f1ee;font-family:'Archivo';font-size:13px\">\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:11px;letter-spacing:1px;color:#7a7a72;white-space:nowrap\"><span style=\"color:#c5f82a\">{{ activeMods }}<\u002Fspan> / {{ totalMods }} активны<\u002Fdiv>\n            <div onclick=\"{{ openAdd }}\" style=\"display:flex;align-items:center;gap:7px;background:#c5f82a;color:#0a0a0a;border-radius:11px;padding:11px 16px;cursor:pointer;font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase\">+ Добавить мод<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- add form -->\n          <sc-if value=\"{{ addOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:10px;margin-bottom:14px;background:#0e0e0e;border:1px dashed rgba(197,248,42,.4);border-radius:12px;padding:12px\">\n              <input value=\"{{ newMod }}\" oninput=\"{{ onNewMod }}\" placeholder=\"Название .jar файла или мода…\" style=\"flex:1;background:#0a0a0a;border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:11px 14px;outline:none;color:#f1f1ee;font-family:'Archivo';font-size:13px\">\n              <div onclick=\"{{ confirmAdd }}\" style=\"display:flex;align-items:center;padding:0 18px;background:#c5f82a;color:#0a0a0a;border-radius:9px;cursor:pointer;font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase\">Установить<\u002Fdiv>\n              <div onclick=\"{{ closeAdd }}\" style=\"display:flex;align-items:center;padding:0 16px;border:1px solid rgba(255,255,255,.12);border-radius:9px;cursor:pointer;font-family:'JetBrains Mono';font-size:11px;color:#9a9a92;text-transform:uppercase\">Отмена<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- mods list -->\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ modList }}\" as=\"m\" hint-placeholder-count=\"5\">\n              <div style=\"{{ m.rowStyle }}\">\n                <div style=\"{{ m.thumbStyle }}\">\n                  <span style=\"font-family:'Oswald';font-weight:700;font-size:16px;color:{{ m.thumbText }}\">{{ m.initial }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:0\">\n                  <div style=\"display:flex;align-items:center;gap:9px\">\n                    <span style=\"font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.3px;color:{{ m.nameColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ m.name }}<\u002Fspan>\n                    <span style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:.5px;color:#6a6a63;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:2px 6px;white-space:nowrap\">{{ m.cat }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono';font-size:10px;color:#6a6a63;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ m.sub }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ m.onDelete }}\" title=\"Удалить\" style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;cursor:pointer;color:#6a6a63;font-size:14px;border:1px solid rgba(255,255,255,.07)\" style-hover=\"color:#ff6b6b;border-color:rgba(255,107,107,.4)\">✕<\u002Fdiv>\n                <div onclick=\"{{ m.onToggle }}\" style=\"{{ m.trackStyle }}\">\n                  <div style=\"{{ m.knobStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- OVERVIEW TAB -->\n      <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr;gap:20px\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:#5e5e58;text-transform:uppercase;margin-bottom:12px\">Описание<\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-size:14px;line-height:1.7;color:#aeaea6\">{{ overviewText }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:#5e5e58;text-transform:uppercase;margin:28px 0 12px\">Последние изменения<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ changelog }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:14px;align-items:baseline\">\n                  <span style=\"font-family:'JetBrains Mono';font-size:10px;color:#c5f82a;width:54px;flex-shrink:0\">{{ c.ver }}<\u002Fspan>\n                  <span style=\"font-family:'Archivo';font-size:13px;color:#9a9a92;line-height:1.5\">{{ c.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#0d0d0d;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;height:fit-content\">\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:#5e5e58;text-transform:uppercase;margin-bottom:16px\">Параметры<\u002Fdiv>\n            <sc-for list=\"{{ specs }}\" as=\"sp\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n                <span style=\"font-family:'JetBrains Mono';font-size:11px;color:#7a7a72;text-transform:uppercase;letter-spacing:.5px\">{{ sp.k }}<\u002Fspan>\n                <span style=\"font-family:'Oswald';font-weight:500;font-size:14px;color:#e6e6e0\">{{ sp.v }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===================== PLAY BAR ===================== -->\n    <div style=\"height:88px;min-height:88px;border-top:1px solid rgba(255,255,255,.06);background:#0a0a0a;display:flex;align-items:center;padding:0 40px;gap:22px\">\n      <div style=\"display:flex;flex-direction:column;gap:5px\">\n        <span style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:#5e5e58;text-transform:uppercase\">Версия<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:7px;font-family:'Oswald';font-weight:500;font-size:15px;color:#e6e6e0\">{{ heroVersion }} <span style=\"color:#5e5e58;font-size:11px\">▾<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:38px;background:rgba(255,255,255,.07)\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:5px\">\n        <span style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:#5e5e58;text-transform:uppercase\">Память<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:7px;font-family:'Oswald';font-weight:500;font-size:15px;color:#e6e6e0\">8 ГБ <span style=\"color:#5e5e58;font-size:11px\">▾<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:38px;background:rgba(255,255,255,.07)\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:5px\">\n        <span style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:#5e5e58;text-transform:uppercase\">Модов активно<\u002Fspan>\n        <div style=\"font-family:'Oswald';font-weight:500;font-size:15px;color:#e6e6e0\">{{ activeMods }} из {{ totalMods }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1\"><\u002Fdiv>\n\n      <div onclick=\"{{ onPlay }}\" style=\"display:flex;align-items:center;gap:16px;background:#c5f82a;border-radius:13px;padding:0 38px;height:56px;cursor:pointer;box-shadow:0 8px 30px rgba(197,248,42,.22)\" style-hover=\"background:#d2ff45\">\n        <div style=\"display:flex;flex-direction:column;line-height:1\">\n          <span style=\"font-family:'Oswald';font-weight:700;font-size:22px;letter-spacing:2px;color:#0a0a0a;text-transform:uppercase\">{{ playLabel }}<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:rgba(10,10,10,.6);text-transform:uppercase;margin-top:3px\">{{ heroName }} · {{ heroVersion }}<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'Oswald';font-weight:700;font-size:20px;color:#0a0a0a\">▶<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    selected: 'famrokia',\n    tab: 'mods',\n    accountOpen: false,\n    addOpen: false,\n    newMod: '',\n    search: '',\n    activeAccount: 'ms',\n    playState: 'idle',\n    accounts: [\n      { id: 'ms', nick: 'Steve_FR', type: 'Microsoft', color: '#5ea8ff' },\n      { id: 'mc', nick: 'fam_player', type: 'Minecraft', color: '#5fb868' },\n    ],\n    mods: {\n      famrokia: [\n        { id: 'm1', name: 'Sodium', cat: 'Оптимизация', author: 'CaffeineMC', version: '0.5.8', size: '1.2 МБ', enabled: true },\n        { id: 'm2', name: 'Iris Shaders', cat: 'Графика', author: 'IrisShaders', version: '1.7.0', size: '3.4 МБ', enabled: true },\n        { id: 'm3', name: 'JourneyMap', cat: 'Карта', author: 'techbrew', version: '5.10.2', size: '6.1 МБ', enabled: true },\n        { id: 'm4', name: 'Just Enough Items', cat: 'Интерфейс', author: 'mezz', version: '15.3', size: '2.0 МБ', enabled: true },\n        { id: 'm5', name: 'Create', cat: 'Механика', author: 'simibubi', version: '0.5.1', size: '18 МБ', enabled: false },\n        { id: 'm6', name: 'AppleSkin', cat: 'Интерфейс', author: 'squeek', version: '2.5.1', size: '0.3 МБ', enabled: true },\n        { id: 'm7', name: 'WorldEdit', cat: 'Инструменты', author: 'EngineHub', version: '7.2.15', size: '4.5 МБ', enabled: false },\n      ],\n      famworks: [\n        { id: 'w1', name: 'Fabric API', cat: 'Библиотека', author: 'FabricMC', version: '0.92.0', size: '2.1 МБ', enabled: true },\n        { id: 'w2', name: 'Lithium', cat: 'Оптимизация', author: 'CaffeineMC', version: '0.12.1', size: '0.9 МБ', enabled: true },\n        { id: 'w3', name: 'Xaero\\u2019s Minimap', cat: 'Карта', author: 'xaero96', version: '23.9.5', size: '3.0 МБ', enabled: true },\n        { id: 'w4', name: 'Mod Menu', cat: 'Интерфейс', author: 'TerraformersMC', version: '11.0', size: '0.5 МБ', enabled: true },\n        { id: 'w5', name: 'Better Animations', cat: 'Графика', author: 'SuperMartijn', version: '2.0', size: '0.8 МБ', enabled: false },\n      ],\n    },\n  };\n\n  builds = [\n    { id: 'famrokia', name: 'Фамрокия', loader: 'Forge', version: '1.20.1', status: 'Обновлено', accent: '#c5f82a',\n      desc: 'Сюжетная RPG-сборка с механиками, картами и кастомным контентом. Готова к запуску.',\n      players: '342', updated: '2 дня назад', size: '4.2 ГБ' },\n    { id: 'famworks', name: 'Famworks', loader: 'Fabric', version: '1.21.4', status: 'Стабильно', accent: '#5ea8ff',\n      desc: 'Лёгкая техно-сборка с упором на оптимизацию и высокий FPS. Минимум лишнего.',\n      players: '128', updated: '5 дней назад', size: '2.6 ГБ' },\n  ];\n\n  cur() { return this.builds.find(b => b.id === this.state.selected); }\n  curMods() { return this.state.mods[this.state.selected] || []; }\n\n  setBuild(id) { this.setState({ selected: id, addOpen: false, search: '' }); }\n  setTab(t) { this.setState({ tab: t }); }\n  toggleAccount() { this.setState(s => ({ accountOpen: !s.accountOpen })); }\n  pickAccount(id) { this.setState({ activeAccount: id, accountOpen: false }); }\n  addAccount(type) {\n    const n = this.state.accounts.length + 1;\n    const acc = { id: 'a' + Date.now(), nick: (type === 'Microsoft' ? 'NewUser' : 'guest') + n, type, color: type === 'Microsoft' ? '#5ea8ff' : '#5fb868' };\n    this.setState(s => ({ accounts: [...s.accounts, acc], activeAccount: acc.id }));\n  }\n\n  toggleMod(id) {\n    this.setState(s => {\n      const list = s.mods[this.state.selected].map(m => m.id === id ? { ...m, enabled: !m.enabled } : m);\n      return { mods: { ...s.mods, [this.state.selected]: list } };\n    });\n  }\n  deleteMod(id) {\n    this.setState(s => {\n      const list = s.mods[this.state.selected].filter(m => m.id !== id);\n      return { mods: { ...s.mods, [this.state.selected]: list } };\n    });\n  }\n  confirmAdd() {\n    const name = this.state.newMod.trim();\n    if (!name) return;\n    const mod = { id: 'u' + Date.now(), name: name.replace(/\\.jar$/i, ''), cat: 'Свой', author: 'локальный', version: '—', size: '— МБ', enabled: true };\n    this.setState(s => ({\n      mods: { ...s.mods, [this.state.selected]: [mod, ...s.mods[this.state.selected]] },\n      newMod: '', addOpen: false,\n    }));\n  }\n\n  doPlay() {\n    this.setState({ playState: 'launching' });\n    clearTimeout(this._pt);\n    this._pt = setTimeout(() => this.setState({ playState: 'idle' }), 2200);\n  }\n\n  renderVals() {\n    const cur = this.cur();\n    const mods = this.curMods();\n    const active = mods.filter(m => m.enabled).length;\n    const q = this.state.search.trim().toLowerCase();\n    const filtered = q ? mods.filter(m => m.name.toLowerCase().includes(q) || m.cat.toLowerCase().includes(q)) : mods;\n\n    const builds = this.builds.map(b => {\n      const sel = b.id === this.state.selected;\n      return {\n        ...b,\n        initial: b.name[0],\n        meta: b.loader + ' · ' + b.version,\n        nameColor: sel ? '#f4f4f1' : '#c8c8c2',\n        onSelect: () => this.setBuild(b.id),\n        rowStyle: `position:relative;overflow:hidden;display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;transition:background .15s;background:${sel ? 'rgba(255,255,255,.05)' : 'transparent'};border:1px solid ${sel ? 'rgba(255,255,255,.09)' : 'transparent'}`,\n        barStyle: `position:absolute;left:0;top:0;bottom:0;width:3px;background:${b.accent};opacity:${sel ? 1 : 0}`,\n        iconStyle: `width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${b.accent};opacity:${sel ? 1 : .55}`,\n        dotStyle: `width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${sel ? b.accent : '#2a2a26'}`,\n      };\n    });\n\n    const accounts = this.state.accounts.map(a => {\n      const sel = a.id === this.state.activeAccount;\n      return {\n        ...a,\n        onSelect: () => this.pickAccount(a.id),\n        rowStyle: `display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;cursor:pointer;background:${sel ? 'rgba(197,248,42,.08)' : 'transparent'}`,\n        avatarStyle: `width:34px;height:34px;border-radius:8px;flex-shrink:0;background:repeating-linear-gradient(135deg,${a.color}33 0 6px,${a.color}1a 6px 12px);border:1px solid ${a.color}55`,\n        check: sel ? '✓' : '',\n        checkStyle: `font-family:'JetBrains Mono';font-size:13px;color:#c5f82a;width:18px;text-align:center`,\n      };\n    });\n\n    const activeAcc = this.state.accounts.find(a => a.id === this.state.activeAccount) || this.state.accounts[0];\n\n    const tabs = [\n      { id: 'mods', label: 'Моды' },\n      { id: 'overview', label: 'Обзор' },\n    ].map(t => {\n      const on = this.state.tab === t.id;\n      return {\n        label: t.label,\n        onSelect: () => this.setTab(t.id),\n        style: `font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;padding:9px 18px;border-radius:9px;cursor:pointer;color:${on ? '#0a0a0a' : '#8a8a82'};background:${on ? '#c5f82a' : 'transparent'};border:1px solid ${on ? '#c5f82a' : 'rgba(255,255,255,.1)'}`,\n      };\n    });\n\n    const modList = filtered.map(m => ({\n      ...m,\n      initial: m.name[0],\n      sub: m.author + ' · v' + m.version + ' · ' + m.size,\n      nameColor: m.enabled ? '#f1f1ee' : '#7a7a72',\n      thumbText: m.enabled ? '#c5f82a' : '#5e5e58',\n      thumbStyle: `width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${m.enabled ? 'rgba(197,248,42,.1)' : '#141414'};border:1px solid ${m.enabled ? 'rgba(197,248,42,.25)' : 'rgba(255,255,255,.06)'}`,\n      rowStyle: `display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:13px;background:#0d0d0d;border:1px solid ${m.enabled ? 'rgba(255,255,255,.08)' : 'rgba(255,255,255,.04)'};opacity:${m.enabled ? 1 : .72}`,\n      trackStyle: `width:46px;height:26px;border-radius:13px;flex-shrink:0;cursor:pointer;position:relative;transition:background .18s;background:${m.enabled ? '#c5f82a' : 'rgba(255,255,255,.12)'}`,\n      knobStyle: `position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:${m.enabled ? '#0a0a0a' : '#e6e6e0'};transition:transform .18s;transform:translateX(${m.enabled ? '20px' : '0'})`,\n      onToggle: () => this.toggleMod(m.id),\n      onDelete: () => this.deleteMod(m.id),\n    }));\n\n    const heroStats = [\n      { value: active, label: 'Модов вкл' },\n      { value: cur.size, label: 'Размер' },\n    ];\n\n    const changelogs = {\n      famrokia: [\n        { ver: '1.20.1', text: 'Добавлена глава «Эпоха Пепла» и 6 новых биомов.' },\n        { ver: '1.19.4', text: 'Переработан баланс боссов, исправлены краши на старте.' },\n        { ver: '1.19.2', text: 'Подключён кастомный лаунч-экран и фоновая музыка.' },\n      ],\n      famworks: [\n        { ver: '1.21.4', text: 'Обновление до Fabric 0.16, прирост FPS до 40%.' },\n        { ver: '1.21.1', text: 'Добавлены Lithium и Xaero’s Minimap в базовый набор.' },\n        { ver: '1.20.6', text: 'Оптимизация загрузки чанков и памяти.' },\n      ],\n    };\n\n    const specs = [\n      { k: 'Загрузчик', v: cur.loader },\n      { k: 'Версия MC', v: cur.version },\n      { k: 'Размер', v: cur.size },\n      { k: 'Обновлено', v: cur.updated },\n      { k: 'Java', v: cur.loader === 'Forge' ? '17' : '21' },\n    ];\n\n    return {\n      buildCount: this.builds.length,\n      builds,\n      accounts,\n      accountOpen: this.state.accountOpen,\n      toggleAccount: () => this.toggleAccount(),\n      addMicrosoft: () => this.addAccount('Microsoft'),\n      addMojang: () => this.addAccount('Minecraft'),\n      accountBg: this.state.accountOpen ? 'rgba(255,255,255,.05)' : 'transparent',\n      accountBorder: this.state.accountOpen ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.06)',\n      chevron: this.state.accountOpen ? 'rotate(0deg)' : 'rotate(180deg)',\n      activeNick: activeAcc.nick,\n      activeType: activeAcc.type,\n      activeTypeColor: activeAcc.color,\n      activeAvatarStyle: `width:38px;height:38px;border-radius:9px;flex-shrink:0;background:repeating-linear-gradient(135deg,${activeAcc.color}33 0 7px,${activeAcc.color}1a 7px 14px);border:1px solid ${activeAcc.color}66`,\n\n      heroName: cur.name,\n      heroDesc: cur.desc,\n      heroStatus: cur.status,\n      heroLoader: cur.loader + ' ' + cur.version,\n      heroVersion: cur.version,\n      heroStats,\n\n      tabs,\n      isMods: this.state.tab === 'mods',\n      isOverview: this.state.tab === 'overview',\n\n      search: this.state.search,\n      onSearch: e => this.setState({ search: e.target.value }),\n      activeMods: active,\n      totalMods: mods.length,\n      modList,\n      addOpen: this.state.addOpen,\n      openAdd: () => this.setState({ addOpen: true }),\n      closeAdd: () => this.setState({ addOpen: false, newMod: '' }),\n      newMod: this.state.newMod,\n      onNewMod: e => this.setState({ newMod: e.target.value }),\n      confirmAdd: () => this.confirmAdd(),\n\n      overviewText: cur.de
